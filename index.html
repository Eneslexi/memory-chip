<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AirChip — Manage Your Memories With Your Hands</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #01020a;
               font-family: 'Orbitron', 'Segoe UI', sans-serif; touch-action: none; }

  #cam { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover;
         transform: scaleX(-1);
         filter: brightness(.98) saturate(1.06) contrast(1.03); }  /* referans gibi: doğal aydınlık */
  #nebula { position: fixed; inset: -20%; z-index: 2; pointer-events: none; opacity: .12;
            background:
              radial-gradient(38% 30% at 75% 18%, rgba(124, 58, 237, .34), transparent 70%),
              radial-gradient(45% 36% at 12% 78%, rgba(6, 182, 212, .26), transparent 70%),
              radial-gradient(30% 26% at 40% 35%, rgba(37, 99, 235, .22), transparent 70%),
              radial-gradient(24% 20% at 88% 70%, rgba(217, 70, 239, .16), transparent 70%);
            filter: blur(14px);
            animation: nebdrift 46s ease-in-out infinite alternate; }
  @keyframes nebdrift {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(2.5%,-2%) scale(1.06); }
    100% { transform: translate(-2%,2.5%) scale(1.02); }
  }
  #tint { position: fixed; inset: 0; z-index: 2; pointer-events: none;
          background: radial-gradient(ellipse at 50% 46%, transparent 62%, rgba(4, 6, 16, .22) 100%); } /* çok hafif vinyet */
  #scan { position: fixed; inset: 0; z-index: 4; pointer-events: none; opacity: .018;
          background: repeating-linear-gradient(0deg, #9bd9ff 0 1px, transparent 1px 5px); }
  #stars { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
  #fx    { position: fixed; inset: 0; z-index: 40; pointer-events: none; }
  #hand  { position: fixed; inset: 0; z-index: 45; pointer-events: none; }

  .card {
    position: fixed; z-index: 10; background: #fdfdfb;
    border-radius: 3px; box-sizing: border-box;
    box-shadow: 0 10px 34px rgba(0,0,0,.55);
    will-change: transform, opacity; user-select: none;
    opacity: 0; transition: opacity .8s ease, box-shadow .3s ease;
  }
  .card.in { opacity: 1; }
  .card img { display: block; width: 100%; aspect-ratio: 4/3.35; object-fit: cover; pointer-events: none; }
  .card .lbl {
    font-family: 'Caveat', cursive; font-weight: 600; color: #1c2333;
    text-align: center; line-height: 1;
    padding: 4% 2% 5% 2%; white-space: nowrap; overflow: hidden;
  }
  .card.held { /* hologram tutuş — gölge SABİT (box-shadow animasyonu kasıyordu) */
    box-shadow: 0 0 0 2px rgba(103,232,249,.85), 0 18px 60px rgba(0,0,0,.6);
    z-index: 36 !important;      /* yörünge kartları (inline z ≤ 22) asla üstüne çıkamaz */
    opacity: 1 !important;       /* arkadayken tutulsa bile soluk kalmaz */
  }
  .card.held::after {            /* nabız: SADECE opaklık animasyonu — GPU dostu, kasmaz */
    content: ''; position: absolute; inset: -4px; border-radius: 6px;
    border: 2.5px solid rgba(165,243,252,.95);
    box-shadow: 0 0 26px rgba(103,232,249,.65), inset 0 0 18px rgba(103,232,249,.25);
    animation: holdpulse 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes holdpulse { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
  .card.warp img { animation: warpin .55s steps(4) both; } /* kolaja dönüşte dijital parıltı */
  @keyframes warpin {
    0%   { filter: hue-rotate(50deg) brightness(2) saturate(2.4) contrast(1.3); }
    55%  { filter: hue-rotate(-30deg) brightness(1.25) saturate(1.4); }
    100% { filter: none; }
  }

  /* ---- sol arşiv yuvaları: elektronik sci-fi çerçeveler ---- */
  .slot {
    position: fixed; z-index: 30; box-sizing: border-box;
    border: 1.5px solid rgba(103,232,249,.5); border-radius: 10px;
    background:
      linear-gradient(135deg, rgba(103,232,249,.10), rgba(12,20,44,.55) 55%),
      rgba(4,10,24,.45);
    backdrop-filter: blur(6px);
    box-shadow: 0 0 18px rgba(103,232,249,.14), inset 0 0 22px rgba(103,232,249,.07);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; transition: box-shadow .18s, border-color .18s, background .18s;
  }
  .slot::before, .slot::after { /* köşe braketleri */
    content: ''; position: absolute; width: 14px; height: 14px;
    border: 2px solid rgba(103,232,249,.85);
  }
  .slot::before { top: -4px; left: -4px; border-right: 0; border-bottom: 0; }
  .slot::after  { bottom: -4px; right: -4px; border-left: 0; border-top: 0; }
  .slot .sl-name { color: #bfefff; font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
                   text-align: center; line-height: 1.2; padding: 0 8px; max-width: 100%;
                   overflow-wrap: break-word; }
  .slot .sl-cnt  { color: rgba(191,239,255,.75); font-size: 11px; letter-spacing: 1px; }
  .slot .sl-bar  { width: 62%; height: 3px; border-radius: 2px; background: rgba(103,232,249,.22); overflow: hidden; }
  .slot .sl-bar i { display: block; height: 100%; width: 0%; background: #67e8f9;
                    box-shadow: 0 0 8px #67e8f9; transition: width .4s ease; }
  .slot.hot {
    border-color: #a5f3fc;
    background: linear-gradient(135deg, rgba(103,232,249,.28), rgba(12,20,44,.6) 60%), rgba(4,10,24,.5);
    box-shadow: 0 0 34px rgba(103,232,249,.55), inset 0 0 30px rgba(103,232,249,.2);
  }
  .slot.gulp { animation: gulp .45s ease; }
  @keyframes gulp { 35% { transform: scale(1.12); } 100% { transform: scale(1); } }

  .chip {
    position: fixed; z-index: 60;
    background: rgba(4,10,24,.55); color: #bfefff;
    border: 1px solid rgba(103,232,249,.45); border-radius: 999px;
    padding: 9px 20px; font-size: 12.5px; font-weight: 700;
    letter-spacing: 2.5px; text-transform: uppercase;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 18px rgba(103,232,249,.12), inset 0 0 14px rgba(103,232,249,.06);
    cursor: pointer; transition: box-shadow .2s, background .2s;
  }
  .chip:hover { background: rgba(9,20,44,.75); box-shadow: 0 0 26px rgba(103,232,249,.3); }
  /* parmak imleci üstündeyken: havadan basılabilir geri bildirimi */
  .chip.hov, .slot.hov { border-color: #a5f3fc;
    box-shadow: 0 0 30px rgba(103,232,249,.5), inset 0 0 16px rgba(103,232,249,.15); }
  .chip.press, .slot.press { animation: airpress .3s ease; }
  @keyframes airpress { 40% { transform: scale(.93); } 100% { transform: scale(1); } }
  #chipReset  { top: 20px; left: 20px; }
  #chipCount  { top: 20px; left: 50%; transform: translateX(-50%); cursor: default; }
  #chipUpload { top: 20px; right: 20px; color: #01020a; background: #67e8f9;
                box-shadow: 0 0 22px rgba(103,232,249,.5); }
  #chipAlbum  { top: 74px; right: 20px; }
  #chipGest   { bottom: 20px; left: 50%; transform: translateX(-50%); cursor: default; font-size: 11px; white-space: nowrap; }

  /* ---- albüm görüntüleyici: BLACK MIRROR "grain" kadranı ---- */
  #albumView { position: fixed; inset: 0; z-index: 150; display: none;
               background:
                 radial-gradient(ellipse at 60% 45%, rgba(64,40,48,.30), transparent 60%),
                 radial-gradient(ellipse at 50% 50%, rgba(10,7,9,.92), rgba(3,2,4,.99) 85%);
               backdrop-filter: blur(12px) saturate(.6); overflow: hidden; }
  #albumView.on { display: block; }
  #avClose { position: fixed; top: 20px; right: 20px; z-index: 165; }
  #bmDial { position: absolute; left: 34%; top: 50%; transform: translate(-50%,-50%);
            width: min(64vh, 58vw); aspect-ratio: 1; z-index: 155; }
  #bmDial svg { width: 100%; height: 100%; display: block; }
  #bmCenter { position: absolute; inset: 0; display: flex; flex-direction: column;
              align-items: center; justify-content: center; gap: 6px; pointer-events: none;
              font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; }
  #bmName { color: #f4f2f0; font-size: clamp(15px, 2.1vh, 22px); font-weight: 400; letter-spacing: 2.5px; }
  #bmIdx  { color: rgba(244,242,240,.85); font-size: clamp(11px, 1.5vh, 15px); letter-spacing: 2px; }
  #bmSub  { color: rgba(244,242,240,.5); font-size: clamp(9px, 1.2vh, 12px); letter-spacing: 4px; margin-top: 2px; }
  #bmRed  { position: absolute; right: 26.5%; top: 47%; width: 7px; height: 7px; border-radius: 50%;
            background: #e11d2e; box-shadow: 0 0 8px #e11d2e; }
  #bmStrip { position: absolute; right: -4vw; top: 50%; width: 46vw; height: 0;
             perspective: 1000px; perspective-origin: 20% 50%; z-index: 152; }
  .bmItem { position: absolute; right: 0; top: 0; width: min(24vw, 340px); aspect-ratio: 16/10;
            transform-style: preserve-3d; will-change: transform, opacity;
            background: #000; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.12); }
  .bmItem img { width: 100%; height: 100%; object-fit: cover; display: block;
                filter: saturate(.85) contrast(1.05); }
  #bmEmpty { position: absolute; left: 34%; top: 72%; transform: translateX(-50%);
             color: rgba(244,242,240,.55); font-size: 12px; letter-spacing: 3px; z-index: 156; }

  /* ---- AIRCHIP intro (Black Mirror ruhu, kodla) ---- */
  #introSeq { position: fixed; inset: 0; z-index: 190; background: #000;
              display: flex; align-items: center; justify-content: center;
              transition: opacity 1.2s ease, transform 1.2s cubic-bezier(.6,0,.2,1); }
  #introSeq.out { opacity: 0; transform: scale(7); pointer-events: none; }
  #introRing { position: absolute; width: min(30vh, 30vw); aspect-ratio: 1; opacity: 0;
               transition: opacity .9s ease; }
  #introRing.on { opacity: 1; }
  #introRing svg { width: 100%; height: 100%; animation: ringspin 7s linear infinite; }
  @keyframes ringspin { to { transform: rotate(360deg); } }
  #introTitle { position: absolute; text-align: center; opacity: 0; }
  #introTitle.on { opacity: 1; }
  #introTitle .t1 { color: #f4f2f0; font-family: 'Segoe UI', sans-serif; font-weight: 700;
                    font-size: clamp(34px, 7vw, 74px); letter-spacing: 14px; }
  #introTitle.on .t1 { animation: glitch 2.2s steps(1) infinite; }
  @keyframes glitch {
    0%, 100% { text-shadow: 0 0 18px rgba(244,242,240,.35); transform: none; }
    7%  { text-shadow: -3px 0 #ff2a4d, 3px 0 #2ad9ff, 0 0 18px rgba(244,242,240,.35); }
    9%  { text-shadow: 0 0 18px rgba(244,242,240,.35); transform: translateX(2px); }
    41% { text-shadow: 3px 0 #ff2a4d, -3px 0 #2ad9ff; transform: skewX(2deg); }
    43% { text-shadow: 0 0 18px rgba(244,242,240,.35); transform: none; }
    73% { text-shadow: -2px 1px #ff2a4d, 2px -1px #2ad9ff; }
    75% { text-shadow: 0 0 18px rgba(244,242,240,.35); }
  }
  #introTitle .t2 { color: rgba(244,242,240,.55); font-family: 'Segoe UI', sans-serif;
                    font-size: clamp(11px, 1.6vw, 15px); letter-spacing: 8px; margin-top: 14px; }
  /* KIRILMA ANI (BM birebir): başlık çatlak boyunca ikiye ayrılıp kayar */
  .t1wrap { position: relative; }
  .t1.frag { position: absolute; inset: 0; display: none; }
  #introTitle.cracked .whole { visibility: hidden; }
  #introTitle.cracked .frag { display: block; animation: none; }
  #introTitle.cracked .fragA {
    clip-path: polygon(0 0, 100% 0, 100% 34%, 0 62%);          /* çatlağın üstü */
    transform: translate(-7px, -5px) rotate(-.7deg);
    text-shadow: -2px 0 rgba(255,42,77,.5), 0 0 18px rgba(244,242,240,.3);
    animation: fragjitA 1.4s steps(1) infinite;
  }
  #introTitle.cracked .fragB {
    clip-path: polygon(0 62%, 100% 34%, 100% 100%, 0 100%);    /* çatlağın altı */
    transform: translate(6px, 5px) rotate(.5deg);
    text-shadow: 2px 0 rgba(42,217,255,.5), 0 0 18px rgba(244,242,240,.3);
    animation: fragjitB 1.7s steps(1) infinite;
  }
  @keyframes fragjitA { 0%,100% {} 8% { transform: translate(-9px,-6px) rotate(-.9deg); } 11% { transform: translate(-7px,-5px) rotate(-.7deg); } }
  @keyframes fragjitB { 0%,100% {} 54% { transform: translate(8px,6px) rotate(.7deg); } 57% { transform: translate(6px,5px) rotate(.5deg); } }
  #introCrack { position: absolute; inset: 0; opacity: 0; pointer-events: none; }
  #introCrack.flash { animation: crackflash .5s ease; }
  @keyframes crackflash { 12% { opacity: 1; } 100% { opacity: 0; } }

  .hud { position: fixed; z-index: 5; width: 46px; height: 46px; pointer-events: none;
         border: 1.5px solid rgba(103,232,249,.3); }
  #h2 { top: 74px; right: 16px; border-left: 0;  border-bottom: 0; }
  #h4 { bottom: 74px; right: 16px; border-left: 0;  border-top: 0; }

  .dot { position: fixed; width: 26px; height: 26px; border-radius: 50%;
         border: 2px solid rgba(255,214,240,.9); background: rgba(255,214,240,.12);
         box-shadow: 0 0 16px rgba(255,190,235,.6);
         transform: translate(-50%,-50%); pointer-events: none; z-index: 70; display: none;
         transition: width .15s, height .15s, background .15s; }
  .dot.pinch { width: 14px; height: 14px; background: rgba(255,214,240,.95); box-shadow: 0 0 26px #ffd6f0; }
  .dot.palm  { width: 40px; height: 40px; border-style: dashed; background: transparent; }

  /* ---- REEL çekim modu (?reel): temiz sahne — kamera + kartlar + el iskeleti + mini albümler ---- */
  body.reel .chip, body.reel .hud, body.reel .dot { display: none !important; }
  body.reel #scan { display: none; }
  body.reel .slot .sl-cnt { display: none; }                 /* kompakt ikon: sadece ad + bar */
  body.reel .slot .sl-name { font-size: 9px; letter-spacing: 1px; }
  /* HAYALET YUVALAR: normalde görünmez — sadece elde fotoğraf varken belirir (ekran temiz kalır) */
  body.reel .slot { opacity: 0; transition: opacity .4s ease; pointer-events: none;
    background: rgba(4,10,24,.30); border-color: rgba(103,232,249,.30);
    backdrop-filter: none; box-shadow: none; }               /* blur yok: performans; tıklanamaz */
  body.reel.holding .slot { opacity: .5; }
  body.reel.holding .slot.hot { opacity: 1; }
  /* referans reel görünümü: PORTRE kartlar, etiket yok — saf polaroid/sanat baskısı */
  body.reel .card .lbl { display: none; }
  body.reel .card img { aspect-ratio: 4/5; }
  body { perspective: 1200px; }  /* 3D yörünge modu için derinlik */
  .card.aim { /* nişan: parmağın altındaki fotoğraf işaretlenir */
    box-shadow: 0 0 0 2px rgba(165,243,252,.95), 0 0 26px rgba(103,232,249,.6),
                0 10px 34px rgba(0,0,0,.55);
  }

  /* ---- albüm adı modalı (prompt() sayfayı donduruyordu; kendi penceremiz akıcı) ---- */
  #albumModal { position: fixed; inset: 0; z-index: 170; display: none;
                align-items: center; justify-content: center; background: rgba(1,2,10,.72);
                backdrop-filter: blur(8px); }
  #albumModal.on { display: flex; }
  #amBox { background: rgba(6,12,28,.92); border: 1px solid rgba(103,232,249,.5);
           border-radius: 16px; padding: 26px 26px 20px; width: min(340px, 86vw);
           box-shadow: 0 0 40px rgba(103,232,249,.2); }
  #amBox h3 { margin: 0 0 14px; color: #bfefff; font-size: 13px; font-weight: 700;
              letter-spacing: 3px; text-transform: uppercase; }
  #amInput { width: 100%; box-sizing: border-box; background: rgba(2,6,16,.8);
             border: 1px solid rgba(103,232,249,.4); border-radius: 10px;
             color: #eaffff; font-family: 'Orbitron', sans-serif; font-size: 15px;
             letter-spacing: 2px; padding: 12px 14px; outline: none; text-transform: uppercase; }
  #amInput:focus { border-color: #67e8f9; box-shadow: 0 0 14px rgba(103,232,249,.3); }
  #amRow { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
  #amRow .chip { position: static; }

  /* ---- MOBİL: dar ekranda butonlar üst üste binmesin ---- */
  @media (max-width: 640px) {
    .chip { font-size: 10.5px; padding: 8px 14px; letter-spacing: 1.5px; }
    #chipCount { display: none; }              /* bilgi chip'i mobilde gereksiz */
    #chipReset  { top: 14px; left: 12px; }
    #chipUpload { top: 14px; right: 12px; }
    #chipAlbum  { top: 60px; right: 12px; }
    #chipGest   { bottom: 12px; font-size: 9px; max-width: 96vw;
                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slot .sl-name { font-size: 9.5px; letter-spacing: 1px; }
    .hud { display: none; }
  }

  /* ---- başlat perdesi (ses + mobil kamera izni için kullanıcı dokunuşu şart) ---- */
  #startOverlay {
    position: fixed; inset: 0; z-index: 200; background: rgba(1,2,10,.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px;
  }
  #startOverlay h1 { color: #dff6ff; font-size: clamp(18px, 4vw, 30px); font-weight: 700;
                     letter-spacing: 6px; text-transform: uppercase; text-align: center;
                     text-shadow: 0 0 24px rgba(103,232,249,.6); margin: 0 20px; }
  #startBtn {
    font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 4px;
    color: #01020a; background: #67e8f9; border: 0; border-radius: 999px;
    padding: 18px 52px; cursor: pointer;
    box-shadow: 0 0 34px rgba(103,232,249,.7), 0 0 110px rgba(103,232,249,.25);
  }
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="nebula"></div>
<div id="tint"></div>
<div id="scan"></div>
<canvas id="stars"></canvas>
<canvas id="fx"></canvas>
<canvas id="hand"></canvas>
<div class="hud" id="h2"></div>
<div class="hud" id="h4"></div>
<div class="chip" id="chipReset">Reset</div>
<div class="chip" id="chipCount">Memories</div>
<div class="chip" id="chipUpload">+ Upload Photos</div>
<div class="chip" id="chipAlbum">+ New Album</div>
<input type="file" id="fileIn" accept="image/*" multiple hidden>
<div id="albumModal">
  <div id="amBox">
    <h3>New Album</h3>
    <input id="amInput" type="text" maxlength="18" placeholder="ALBUM NAME">
    <div id="amRow">
      <div class="chip" id="amCancel">Cancel</div>
      <div class="chip" id="amOk" style="color:#01020a;background:#67e8f9">Create</div>
    </div>
  </div>
</div>
<div id="albumView">
  <div class="chip" id="avClose">Close ✕</div>
  <div id="bmDial">
    <svg viewBox="0 0 480 480">
      <circle cx="240" cy="240" r="176" fill="none" stroke="rgba(244,242,240,.5)" stroke-width="1.2"/>
      <circle cx="240" cy="240" r="154" fill="none" stroke="rgba(244,242,240,.55)" stroke-width="2" stroke-dasharray="3 9"/>
      <circle cx="240" cy="240" r="132" fill="none" stroke="rgba(244,242,240,.35)" stroke-width="5" stroke-dasharray="14 12"/>
      <circle cx="240" cy="240" r="110" fill="none" stroke="rgba(244,242,240,.45)" stroke-width="1.5" stroke-dasharray="2 12"/>
      <circle id="bmProg" cx="240" cy="240" r="176" fill="none" stroke="#f4f2f0" stroke-width="4"
              stroke-linecap="round" transform="rotate(-90 240 240)"/>
      <circle cx="240" cy="240" r="56" fill="#262626" stroke="rgba(244,242,240,.3)" stroke-width="1.5"/>
    </svg>
    <div id="bmCenter"><div id="bmName"></div><div id="bmIdx"></div><div id="bmSub">AIRCHIP</div></div>
    <i id="bmRed"></i>
  </div>
  <div id="bmStrip"></div>
  <div id="bmEmpty" style="display:none">THIS ALBUM IS EMPTY — DROP A PHOTO IN WITH YOUR HAND</div>
</div>
<div id="introSeq" style="display:none">
  <div id="introRing">
    <svg viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(244,242,240,.7)" stroke-width="2" stroke-dasharray="10 14"/>
      <circle cx="100" cy="100" r="66" fill="none" stroke="rgba(244,242,240,.4)" stroke-width="1" stroke-dasharray="2 8"/>
      <circle cx="100" cy="100" r="86" fill="none" stroke="#f4f2f0" stroke-width="3" stroke-linecap="round"
              stroke-dasharray="80 460" />
    </svg>
  </div>
  <div id="introTitle">
    <div class="t1wrap">
      <div class="t1 whole">AIRCHIP</div>
      <div class="t1 frag fragA" aria-hidden="true">AIRCHIP</div>
      <div class="t1 frag fragB" aria-hidden="true">AIRCHIP</div>
    </div>
    <div class="t2">MEMORY ARCHIVE</div>
  </div>
  <svg id="introCrack" viewBox="0 0 100 60" preserveAspectRatio="none">
    <g stroke="rgba(255,255,255,.9)" stroke-width=".18" fill="none">
      <path d="M8,60 L26,38 L31,40 L44,22 L47,26 L58,8 L63,12 L78,0"/>
      <path d="M26,38 L20,30 M44,22 L38,16 M58,8 L52,2 M47,26 L55,30 L70,24"/>
      <path d="M31,40 L36,48 L52,54 M63,12 L74,18 L88,14"/>
    </g>
  </svg>
</div>
<div class="chip" id="chipGest">👌 Pinch = Grab · 🤏↔️ Spread = Zoom · 🖐️ Open = Drop · ⚡ Flick = Throw · 🖐️➡️ Swipe = Scatter · 👏 Clap = 3D Orbit</div>
<div class="dot" id="dot0"></div>
<div class="dot" id="dot1"></div>
<div id="startOverlay"><h1>AIRCHIP</h1><button id="startBtn">START</button></div>

<script src="photos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const IS_MOBILE = Math.min(innerWidth, innerHeight) < 640;
if (IS_MOBILE) addEventListener('DOMContentLoaded', () => {
  document.getElementById('chipGest').textContent = '👌 Grab · 🤏 Zoom · 🖐️ Drop · ✋ Move';
});
const REEL = new URLSearchParams(location.search).has('reel'); // çekim modu: UI gizli, sahne temiz
if (REEL) document.body.classList.add('reel');
const S = Math.min(1, innerWidth / 980) * (IS_MOBILE ? 1.15 : 1); // genel ölçek
const LERP = 0.16, DAMP = 0.985;
const cards = [];
let held = null, holdHand = -1, scaleBase = null, grabHandSize = null;
let parTX = 0, parTY = 0; // paralaks hedefi (el konumu → galeri akışı; kartlar kendi hızında takip eder)
let layoutMode = 0, lastShuffle = 0;
let hotSlotCur = null, hotSince = 0; // yuvada bekleme sayacı (üzerinden geçerken yutmayı önler)

// ================= SES MOTORU (WebAudio sentez — dosya yok) =================
let AC = null, noiseBuf = null, lastWhoosh = 0;
function audioInit() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  noiseBuf = AC.createBuffer(1, AC.sampleRate * 1.2, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}
function sndWhoosh(intensity) { // Black Mirror tarzı: koyu, yumuşak, elektronik "vuum"
  if (!AC) return;
  const now = performance.now();
  if (now - lastWhoosh < 240) return;
  lastWhoosh = now;
  const t = AC.currentTime, i = Math.min(1, intensity);
  // gövde: alçak sinüs kayması (dijital "whum")
  const o = AC.createOscillator(), og = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150 + 110 * i, t);
  o.frequency.exponentialRampToValueAtTime(58, t + .34);
  og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.14 + 0.1 * i, t + .05);
  og.gain.exponentialRampToValueAtTime(0.0001, t + .38);
  o.connect(og).connect(AC.destination); o.start(t); o.stop(t + .4);
  // beşinci üstte ikinci katman: elektronik parlaklık, çok kısık
  const o2 = AC.createOscillator(), og2 = AC.createGain();
  o2.type = 'triangle';
  o2.frequency.setValueAtTime((150 + 110 * i) * 1.5, t);
  o2.frequency.exponentialRampToValueAtTime(90, t + .3);
  og2.gain.setValueAtTime(0.0001, t);
  og2.gain.exponentialRampToValueAtTime(0.05 + 0.04 * i, t + .04);
  og2.gain.exponentialRampToValueAtTime(0.0001, t + .32);
  o2.connect(og2).connect(AC.destination); o2.start(t); o2.stop(t + .35);
  // hava: alçak-geçirenle iyice yumuşatılmış az miktar doku (tizler kesik = gıcıklık yok)
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = .7;
  lp.frequency.setValueAtTime(700 + 500 * i, t);
  lp.frequency.exponentialRampToValueAtTime(160, t + .32);
  const ng = AC.createGain();
  ng.gain.setValueAtTime(0.0001, t);
  ng.gain.exponentialRampToValueAtTime(0.07 + 0.05 * i, t + .05);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + .34);
  src.connect(lp).connect(ng).connect(AC.destination); src.start(t); src.stop(t + .38);
}
function sndGrab() { // tutma: kısa dijital blip
  if (!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(430, t);
  o.frequency.exponentialRampToValueAtTime(940, t + .09);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.14, t + .02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + .14);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t + .16);
}
function sndAbsorb() { // yuvaya emilme: aşağı kayan çığlık + hava
  if (!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(760, t);
  o.frequency.exponentialRampToValueAtTime(96, t + .4);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.2, t + .04);
  g.gain.exponentialRampToValueAtTime(0.0001, t + .46);
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1600;
  o.connect(lp).connect(g).connect(AC.destination); o.start(t); o.stop(t + .5);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.setValueAtTime(2400, t); bp.frequency.exponentialRampToValueAtTime(300, t + .35);
  const g2 = AC.createGain();
  g2.gain.setValueAtTime(0.0001, t);
  g2.gain.exponentialRampToValueAtTime(0.12, t + .03);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + .4);
  src.connect(bp).connect(g2).connect(AC.destination); src.start(t); src.stop(t + .45);
}
let lastScrub = 0;
function sndScrub() { // Black Mirror grain kaydırma: havalı "şık" + minik mekanik tık
  if (!AC) return;
  const now = performance.now();
  if (now - lastScrub < 70) return;
  lastScrub = now;
  const t = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.9 + Math.random() * 0.25;   // her karede minik varyasyon
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 2.2;
  bp.frequency.setValueAtTime(2100, t);
  bp.frequency.exponentialRampToValueAtTime(900, t + .07);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.12, t + .012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + .09);
  src.connect(bp).connect(g).connect(AC.destination); src.start(t); src.stop(t + .1);
  const o = AC.createOscillator(); o.type = 'square'; o.frequency.value = 3100;
  const g2 = AC.createGain();
  g2.gain.setValueAtTime(0.028, t);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + .025);
  o.connect(g2).connect(AC.destination); o.start(t); o.stop(t + .03);
}
function sndShuffle() { // dizilim: çift süpürme + tiz ping
  if (!AC) return;
  sndWhoosh(1);
  const t = AC.currentTime + .12;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(1180, t);
  o.frequency.exponentialRampToValueAtTime(1560, t + .1);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.1, t + .03);
  g.gain.exponentialRampToValueAtTime(0.0001, t + .3);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t + .32);
}

// ================= KALICI DEPO (IndexedDB) =================
const DB = {
  db: null,
  mem: { photos: [], albums: [] },  // depolama yoksa bellek-içi yedek (gizli mod, kısıtlı ortamlar)
  memId: 1,
  open() {
    const idb = new Promise((res) => {
      try {
        const r = indexedDB.open('anilar', 1);
        r.onupgradeneeded = e => {
          const d = e.target.result;
          d.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
          d.createObjectStore('albums', { keyPath: 'id', autoIncrement: true });
        };
        r.onsuccess = e => { DB.db = e.target.result; res(); };
        r.onerror = () => res();   // hata = kalıcılıksız devam
        r.onblocked = () => res();
      } catch (e) { res(); }
    });
    const timeout = new Promise(res => setTimeout(res, 1500)); // asla sonsuza dek bekleme
    return Promise.race([idb, timeout]);
  },
  op(store, mode, fn) {
    return new Promise((res, rej) => {
      const tx = DB.db.transaction(store, mode);
      const rq = fn(tx.objectStore(store));
      rq.onsuccess = () => res(rq.result);
      rq.onerror = rej;
    });
  },
  add(s, v) {
    if (!DB.db) { v.id = DB.memId++; DB.mem[s].push(v); return Promise.resolve(v.id); }
    return DB.op(s, 'readwrite', o => o.add(v));
  },
  put(s, v) {
    if (!DB.db) return Promise.resolve();
    return DB.op(s, 'readwrite', o => o.put(v));
  },
  all(s) {
    if (!DB.db) return Promise.resolve([...DB.mem[s]]);
    return DB.op(s, 'readonly', o => o.getAll());
  },
};

// ================= SOL ARŞİV YUVALARI (dinamik, DB'den) =================
let SLOTS = [];
const slotW = Math.round((REEL ? 106 : 150) * S), slotH = Math.round((REEL ? 68 : 104) * S),
      slotGap = Math.round(52 * S); // reel: kompakt ikonlar; normal: yuvalar ayrık (yanlış albüme atma azalır)
function slotUI(s) {
  s.el.querySelector('.sl-cnt').textContent = `${s.count} PICS`;
  s.el.querySelector('.sl-bar i').style.width = Math.min(100, s.count * 12) + '%';
}
function createSlot(rec) {
  const s = { id: rec.id, label: rec.label, count: 0 };
  const el = document.createElement('div');
  el.className = 'slot';
  el.innerHTML = `<div class="sl-name">${s.label}</div><div class="sl-bar"><i></i></div><div class="sl-cnt">0 PICS</div>`;
  el.style.width = slotW + 'px'; el.style.height = slotH + 'px';
  el.addEventListener('click', () => openAlbum(s));
  document.body.appendChild(el);
  s.el = el;
  SLOTS.push(s);
  layoutSlots();
  return s;
}
function layoutSlots() {
  if (REEL) {           // reel: SOL ALTA kompakt ikon sırası — tut & bırak için
    const y = innerHeight - slotH - 14;
    SLOTS.forEach((s, i) => {
      s.x = 14 + i * (slotW + 12); s.y = y;
      s.el.style.left = s.x + 'px'; s.el.style.top = s.y + 'px';
    });
    return;
  }
  const totalH = SLOTS.length * slotH + (SLOTS.length - 1) * slotGap;
  const y0 = Math.max(96, (innerHeight - totalH) / 2);
  SLOTS.forEach((s, i) => {
    s.x = 16; s.y = y0 + i * (slotH + slotGap);
    s.el.style.left = s.x + 'px'; s.el.style.top = s.y + 'px';
  });
}
addEventListener('resize', layoutSlots);

// ---- albüm görüntüleyici: grain kadranı + sağda yatık ekran şeridi ----
let bmItems = [], bmPos = 0, bmPosS = 0, bmRAF = null, bmLastIdx = -1;
const BM_PROG = () => document.getElementById('bmProg');
function bmRender() {
  const n = bmItems.length;
  bmPos = Math.max(0, Math.min(n - 1, bmPos));
  bmPosS += (bmPos - bmPosS) * 0.12;
  const R = innerHeight * 0.44;
  bmItems.forEach((it, i) => {
    const a = (i - bmPosS) * 0.5;
    const y = Math.sin(a) * R;
    const x = (1 - Math.cos(a)) * innerWidth * 0.09;
    const sc = Math.max(0.5, Math.cos(a) * 0.95);
    const op = Math.max(0, 1.25 - Math.abs(a) * 0.75);
    it.el.style.transform =
      `translate3d(${x}px, ${y - it.h / 2}px, 0) rotateY(-34deg) rotateZ(${a * 7}deg) scale(${sc})`;
    it.el.style.opacity = op;
    it.el.style.zIndex = Math.round(100 + Math.cos(a) * 50);
  });
  const cur = Math.round(bmPosS);
  if (cur !== bmLastIdx && bmItems.length) {
    bmLastIdx = cur;
    document.getElementById('bmIdx').textContent = `${cur + 1} / ${n}`;
    sndScrub();   // grain kaydırma sesi
  }
  const C = 2 * Math.PI * 176;
  const frac = n > 1 ? bmPos / (n - 1) : 0;
  BM_PROG().setAttribute('stroke-dasharray', `${Math.max(10, C * frac * 0.999)} ${C}`);
  bmRAF = requestAnimationFrame(bmRender);
}
async function openAlbum(slot) {
  if (REEL) return;   // REEL: albüm görüntüleyici hiçbir yoldan açılamaz — akış kesilmez
  const v = document.getElementById('albumView');
  document.getElementById('bmName').textContent = slot.label;
  const strip = document.getElementById('bmStrip');
  strip.innerHTML = ''; bmItems = []; bmPos = 0; bmPosS = 0; bmLastIdx = -1;
  const mine = (await DB.all('photos')).filter(p => p.album === slot.id);
  document.getElementById('bmEmpty').style.display = mine.length ? 'none' : 'block';
  document.getElementById('bmIdx').textContent = mine.length ? `1 / ${mine.length}` : 'EMPTY';
  mine.forEach(p => {
    const d = document.createElement('div'); d.className = 'bmItem';
    d.innerHTML = `<img src="${p.data}">`;
    strip.appendChild(d);
    bmItems.push({ el: d, h: d.offsetHeight || 200 });
  });
  bmItems.forEach(it => it.h = it.el.offsetHeight);
  v.classList.add('on');
  if (bmRAF) cancelAnimationFrame(bmRAF);
  bmRender();
}
document.getElementById('avClose').onclick = () => {
  document.getElementById('albumView').classList.remove('on');
  if (bmRAF) { cancelAnimationFrame(bmRAF); bmRAF = null; }
};
// kaydırma: tekerlek + dikey sürükleme (mobil dahil)
addEventListener('wheel', e => {
  if (!document.getElementById('albumView').classList.contains('on')) return;
  bmPos += e.deltaY * 0.0022;
}, { passive: true });
let bmDrag = null;
addEventListener('pointerdown', e => {
  if (document.getElementById('albumView').classList.contains('on')) bmDrag = e.clientY;
});
addEventListener('pointermove', e => {
  if (bmDrag !== null) { bmPos -= (e.clientY - bmDrag) * 0.008; bmDrag = e.clientY; }
});
addEventListener('pointerup', () => bmDrag = null);
function slotAt(px, py) {
  const m = 4; // dar tolerans: kart yuvanın gerçekten İÇİNE girmeli
  return SLOTS.find(s => px > s.x - m && px < s.x + slotW + m && py > s.y - m && py < s.y + slotH + m);
}
function absorb(card, slot) { // fotoğraf küçülerek yuvaya emilir
  const idx = cards.indexOf(card);
  if (idx >= 0) cards.splice(idx, 1);
  if (held === card) { held = null; holdHand = -1; scaleBase = null; grabHandSize = null; }
  card.el.classList.remove('held');
  const cx = slot.x + slotW / 2 - card.w / 2, cy = slot.y + slotH / 2 - card.h / 2;
  card.el.style.transition = 'transform .5s cubic-bezier(.45,-.15,.25,1), opacity .48s ease';
  card.el.style.transform = `translate(${cx}px,${cy}px) rotate(${(Math.random()-.5)*40}deg) scale(0.04)`;
  card.el.style.opacity = 0;
  setTimeout(() => card.el.remove(), 560);
  slot.count++;
  slotUI(slot);
  if (card.rec) { card.rec.album = slot.id; DB.put('photos', card.rec); } // kalıcı: yenile-aç, albümde durur
  slot.el.classList.remove('gulp'); void slot.el.offsetWidth; slot.el.classList.add('gulp');
  spark(slot.x + slotW / 2, slot.y + slotH / 2, 22, 6);
  sndAbsorb();
  document.getElementById('chipCount').textContent = `Memories · ${cards.length} shots`;
}

// ================= KARTLAR =================
function makeCard(ph, i) { // ph: {src, name, rec?} — rec = DB kaydı (kullanıcı fotoğrafı)
  // REEL: referans gibi — TEK TİP boyut (hepsi eşit polaroid)
  const w = (REEL ? 96 : 88 + Math.random() * 58) * S;
  const HF = REEL ? 1.22 : 1.06;                       // portre oran (etiketsiz) / klasik kart
  const dNorm = REEL ? Math.random() : (w / S - 88) / 58;  // reel: derinlik katmanı rastgele (hareket çeşitliliği)
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `<img src="${ph.src}" draggable="false"><div class="lbl">${ph.name}</div>`;
  // boyutlar BİR KEZ ayarlanır; animasyon transform:scale ile (layout thrash yok)
  el.style.width = w + 'px';
  el.style.padding = REEL ? `${w * 0.055}px` : `${w * 0.05}px ${w * 0.05}px 0px`;
  const nm = (ph.name || ' ');
  el.querySelector('.lbl').style.fontSize =
    Math.max(9, Math.min(w * 0.16, (w * 2.0) / nm.length)) + 'px';
  document.body.appendChild(el);
  const c = {
    el, w, h: w * HF, tw: w, th: w * HF, baseW: w, baseH: w * HF,
    name: ph.name || ' ', rec: ph.rec || null,
    x: innerWidth / 2 - w / 2, y: innerHeight / 2 - w * HF / 2,
    tx: 0, ty: 0, vx: 0, vy: 0, pull: 0.02,
    depth: dNorm,
    // organik akış: her kartın kendi takip hızı ve genliği (yakın=çevik, uzak=süzülür)
    // REEL: paralaks daha güçlü — sahne elle birlikte AKAR (referans senkron hissi)
    pX: 0, pY: 0,
    pK: (REEL ? 0.05 : 0.035) + dNorm * (REEL ? 0.13 : 0.095),
    ampX: (REEL ? 70 : 48) + dNorm * (REEL ? 230 : 165),
    ampY: (REEL ? 50 : 34) + dNorm * (REEL ? 170 : 118),
    rot: (Math.random() - .5) * 8, trot: (Math.random() - .5) * 8,   // hafif eğim (dağınık moodboard değil, araç)
    bobA: Math.random() * Math.PI * 2, bobS: 0.25 + Math.random() * 0.5
  };
  cards.push(c);
  setTimeout(() => el.classList.add('in'), 55 * i + 80);
  return c;
}
const LEFT_PAD = REEL ? 24 : 16 + slotW + 26; // reel: yuvalar gizli, tüm ekran kullanılır
function separateTargets(margin = 10) { // hedefleri birbirinden AYIR — kartlar iç içe girmesin
  for (let it = 0; it < 4; it++) {
    for (let i = 0; i < cards.length; i++) for (let j = i + 1; j < cards.length; j++) {
      const a = cards[i], b = cards[j];
      const ax = a.tx + a.baseW / 2, ay = a.ty + a.baseH / 2;
      const bx = b.tx + b.baseW / 2, by = b.ty + b.baseH / 2;
      const ox = (a.baseW + b.baseW) / 2 + margin - Math.abs(ax - bx);
      const oy = (a.baseH + b.baseH) / 2 + margin - Math.abs(ay - by);
      if (ox > 0 && oy > 0) {                     // çakışma: dar eksende yarı yarıya it
        if (ox < oy) { const s2 = (ax < bx ? -1 : 1) * ox / 2; a.tx += s2; b.tx -= s2; }
        else         { const s2 = (ay < by ? -1 : 1) * oy / 2; a.ty += s2; b.ty -= s2; }
      }
    }
    for (const c of cards) {                      // ekran içinde kal
      c.tx = Math.max(8, Math.min(innerWidth - c.baseW - 8, c.tx));
      c.ty = Math.max(76, Math.min(innerHeight - c.baseH - 76, c.ty));
    }
  }
}
function collageTargets() { // KOLAJ (referans reel): fotoğraflar yüzün ETRAFINA halka gibi dizilir
  const cx = innerWidth / 2, cy = innerHeight * 0.47;
  const clearX = Math.min(innerWidth * 0.15, 240);   // yüz boşluğu — merkez temiz kalır
  const clearY = innerHeight * 0.20;
  const n = Math.max(1, cards.length);
  cards.forEach((c, i) => {
    const ring = i % 2;                               // iç halka yoğun, dış halka geniş
    const a = (i / n) * Math.PI * 2 + ring * 0.4 + (Math.random() - .5) * 0.3;
    const rx = clearX + (ring ? innerWidth  * 0.22 : innerWidth  * 0.07) + Math.random() * innerWidth  * 0.07;
    const ry = clearY + (ring ? innerHeight * 0.22 : innerHeight * 0.07) + Math.random() * innerHeight * 0.08;
    c.tx = Math.max(8, Math.min(innerWidth  - c.baseW - 8,  cx + Math.cos(a) * rx - c.baseW / 2));
    c.ty = Math.max(76, Math.min(innerHeight - c.baseH - 76, cy + Math.sin(a) * ry - c.baseH / 2));
    c.trot = (Math.random() - .5) * 18;
  });
  separateTargets();   // kalabalık ama AYRIK — referans duvar hissi
}
function scatterTargets() {
  for (const c of cards) {
    c.tx = LEFT_PAD + Math.random() * (innerWidth - c.baseW - LEFT_PAD - 30);
    c.ty = 84 + Math.random() * (innerHeight - c.baseH - 170);
    c.trot = (Math.random() - .5) * 26;
  }
  separateTargets(6);
}
function gridTargets() {
  const n = cards.length, availW = innerWidth - LEFT_PAD - 40;
  const cols = Math.max(3, Math.ceil(Math.sqrt(n * availW / innerHeight / 0.9)));
  const rows = Math.ceil(n / cols);
  const cw = availW / cols, ch = (innerHeight - 190) / rows;
  const order = [...cards].sort(() => Math.random() - .5);
  order.forEach((c, i) => {
    c.tx = LEFT_PAD + (i % cols) * cw + (cw - c.baseW) / 2;
    c.ty = 95 + Math.floor(i / cols) * ch + (ch - c.baseH) / 2;
    c.trot = (Math.random() - .5) * 4;
  });
}
let regatherT = null, waves = [];
// ===== 👏 3D YÖRÜNGE MODU: alkışla aç/kapa — kartlar uzay boşluğunda ağır ağır döner =====
// Yörüngedeyken 🖐️➡️ savurma = formasyon değiştir: 💍 halka → 🧬 sarmal → ∞ sonsuzluk → 🌌 galaksi
let orbitMode = false, orbitA = 0, orbitType = 0;
function toggleOrbit(wx, wy) {
  clearTimeout(regatherT);                          // bekleyen kolaj toplanması iptal
  for (let k = 0; k < 3; k++) waves.push({ x: wx, y: wy, r: 12 + k * 24, s: 14 + k * 4, life: 1 });
  spark(wx, wy, 26, 7);
  sndShuffle();
  if (!orbitMode) {
    orbitMode = true;
    cards.forEach((c, i) => { c.oi = i; c.tw = c.baseW; c.th = c.baseH; c.pull = 0.02; });
  } else exitOrbit();
}
function exitOrbit() { // SARMAL DAĞILMA: kartlar döne döne birbirinden ayrılır, sonra kolaja süzülür
  orbitMode = false;
  cards.forEach(c => { c.el.style.opacity = ''; c.el.style.zIndex = ''; });
  const cx0 = innerWidth / 2, cy0 = innerHeight * 0.46;
  cards.forEach((c, i) => {
    const ax = c.x + c.w / 2 - cx0, ay = c.y + c.h / 2 - cy0;
    const L = Math.max(60, Math.hypot(ax, ay));
    c.vx = (-ay / L) * 9 + (ax / L) * 3.5;          // teğet + dışa: sarmal savrulma
    c.vy = ( ax / L) * 9 + (ay / L) * 3.5;
    c.trot = (i % 2 ? 1 : -1) * 55;                  // döne döne
    c.tx = c.x; c.ty = c.y; c.pull = 0.005;
    c.tw = c.baseW * 0.7; c.th = c.baseH * 0.7;
  });
  sndWhoosh(1);
  clearTimeout(regatherT);
  regatherT = setTimeout(() => {                     // savrulma bitince kolaja dönüş
    layoutMode = 0; collageTargets();
    cards.forEach((c, i) => {
      c.tw = c.baseW; c.th = c.baseH; c.trot = (Math.random() - .5) * 18;
      setTimeout(() => {
        c.pull = 0.12;
        c.el.classList.remove('warp'); void c.el.offsetWidth; c.el.classList.add('warp');
      }, i * 16);
    });
    sndShuffle();
  }, 1900);
}
function swipeScatter(dir, wx, wy) { // 🖐️➡️ SAVURMA: kartlar savurma yönünde küçülüp uçuşur, sonra kolaja döner
  wx = wx ?? innerWidth / 2; wy = wy ?? innerHeight / 2;
  layoutMode = 1;
  scatterTargets();
  cards.forEach((c, i) => {
    c.vx += dir * (6 + Math.random() * 9);        // savurma yönünde itki — bulut savrulması
    c.vy += (Math.random() - .5) * 6;
    c.tw = c.baseW * 0.5; c.th = c.baseH * 0.5;
    setTimeout(() => { c.pull = 0.13; }, i * 14);
  });
  // SCI-FI ŞOK DALGASI: avuçtan yayılan 3 neon halka + yöne fışkıran kıvılcım
  for (let k = 0; k < 3; k++) waves.push({ x: wx, y: wy, r: 14 + k * 26, s: 15 + k * 4, life: 1 });
  for (let i = 0; i < 34; i++) sparks.push({
    x: wx, y: wy, vx: dir * (2.5 + Math.random() * 10), vy: (Math.random() - .5) * 5.5,
    life: 1, big: Math.random() < .4
  });
  sndShuffle();
  clearTimeout(regatherT);
  regatherT = setTimeout(() => {                   // ~2.8sn sonra kendiliğinden kolaja toplanır
    layoutMode = 0; collageTargets();
    cards.forEach((c, i) => {
      c.tw = c.baseW; c.th = c.baseH;
      setTimeout(() => {
        c.pull = 0.14;
        c.el.classList.remove('warp'); void c.el.offsetWidth; c.el.classList.add('warp'); // dijital parıltı
      }, i * 18);
    });
    sndShuffle();
  }, 2800);
}
function reshuffle() {
  layoutMode = (layoutMode + 1) % 3;   // 0=kolaj (referans) · 1=küçülüp dağıl (bulut) · 2=ızgara
  (layoutMode === 0 ? collageTargets : layoutMode === 1 ? scatterTargets : gridTargets)();
  const k = layoutMode === 1 ? 0.5 : 1;  // dağınık mod: kartlar KÜÇÜLÜR — referanstaki bulut savrulması
  cards.forEach((c, i) => {
    setTimeout(() => { c.pull = 0.16; }, i * 22);
    c.tw = c.baseW * k; c.th = c.baseH * k;
  });
  spark(innerWidth / 2, innerHeight / 2, 40, 9);
  sndShuffle();
}
const MAX_WALL = REEL ? 34 : 36; // reel: kalabalık duvar (referans yoğunluğu) // reel: az kart = akıcı animasyon + temiz ekran; normal: 36
async function spawnCards() {
  document.querySelectorAll('.card').forEach(e => e.remove());
  cards.length = 0;
  // duvar = henüz albüme KONMAMIŞ kullanıcı fotoğrafları; hiç yoksa demo seti
  const userPh = (await DB.all('photos'));
  const unfiled = userPh.filter(p => !p.album).map(p => ({ src: p.data, name: p.name, rec: p }));
  const demo = [...PHOTOS].map(p => ({ src: p.file, name: p.name, pin: p.file.startsWith('photos_ai') }));
  let list;
  if (REEL) {  // reel: kullanıcının AI görselleri + yüklemeleri GARANTİ duvarda, kalan rastgele
    const pinned = [...unfiled, ...demo.filter(p => p.pin)];
    const rest = demo.filter(p => !p.pin).sort(() => Math.random() - .5);
    list = [...pinned, ...rest].slice(0, MAX_WALL).sort(() => Math.random() - .5);
  } else {
    list = (unfiled.length ? unfiled : demo).sort(() => Math.random() - .5).slice(0, MAX_WALL);
  }
  list.forEach(makeCard);
  layoutMode = 0; collageTargets();   // varsayılan: KOLAJ — fotoğraflar yüzün etrafında (referans reel); 🖐️⬆ ile dağıt
  cards.forEach(c => { c.pull = 0.06; });
  // albüm sayaçlarını DB'den doldur
  SLOTS.forEach(s => { s.count = userPh.filter(p => p.album === s.id).length; slotUI(s); });
  document.getElementById('chipCount').textContent = `Memories · ${cards.length} shots`;
}
function cardAt(px, py) {
  for (let i = cards.length - 1; i >= 0; i--) {
    const c = cards[i], m = 22;
    if (px > c.x - m && px < c.x + c.w + m && py > c.y - m && py < c.y + c.h + m) return c;
  }
  return null;
}

let stars = [];

  stars = Array.from({ length: 110 }, () => ({

let meteors = [];
function maybeMeteor(dt) {
  return; // kullanışlılık modu: meteor yok (oyun hissini azalt) — istenirse bu satırı sil
  if (Math.random() < 0.004 * dt && meteors.length < 2) {
    const fromLeft = Math.random() < .5;
    meteors.push({
      x: fromLeft ? -40 : Math.random() * st.width, y: Math.random() * st.height * .4,
      vx: (fromLeft ? 1 : -1) * (7 + Math.random() * 6), vy: 3 + Math.random() * 3, life: 1
    });
  }
}
const fx = document.getElementById('fx'), fctx = fx.getContext('2d');
let sparks = [];
function resizeFx(){ fx.width = innerWidth; fx.height = innerHeight; }
addEventListener('resize', resizeFx); resizeFx();
function spark(x, y, n, spread) {
  for (let i = 0; i < n; i++) sparks.push({
    x, y, vx: (Math.random()-.5) * spread, vy: (Math.random()-.5) * spread - .3,
    life: 1, big: Math.random() < .25
  });
}
function ambientDust(dt) {
  if (Math.random() < (REEL ? .2 : .12) * dt) sparks.push({   // reel: hafif parçacık (performans dengeli)
    x: Math.random() * innerWidth, y: innerHeight * (0.25 + Math.random() * .8),
    vx: (Math.random() - .5) * .5, vy: -(.25 + Math.random() * .55),
    life: 1, big: Math.random() < .3, slow: true
  });
}

// ================= ANA DÖNGÜ =================
let tPrev = performance.now();
function loop(tNow) {
  const dt = Math.min(32, tNow - tPrev) / 16.67; tPrev = tNow;
  const t = tNow / 1000;

  sctx.clearRect(0, 0, st.width, st.height);
  for (const s of stars) {
    s.x -= s.s * dt; if (s.x < 0) s.x = st.width;
    s.tw += 0.03 * dt;
    sctx.globalAlpha = 0.07 + 0.09 * Math.abs(Math.sin(s.tw));  // aydınlık modda yıldızlar silik
    sctx.fillStyle = '#cfe9ff';
    sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, 7); sctx.fill();
  }
  sctx.globalAlpha = 1;
  maybeMeteor(dt);
  meteors = meteors.filter(m => m.life > 0);
  for (const m of meteors) {
    m.x += m.vx * dt; m.y += m.vy * dt; m.life -= .012 * dt;
    const g = sctx.createLinearGradient(m.x, m.y, m.x - m.vx * 9, m.y - m.vy * 9);
    g.addColorStop(0, `rgba(200,235,255,${.85 * m.life})`);
    g.addColorStop(1, 'rgba(200,235,255,0)');
    sctx.strokeStyle = g; sctx.lineWidth = 2;
    sctx.beginPath(); sctx.moveTo(m.x, m.y); sctx.lineTo(m.x - m.vx * 9, m.y - m.vy * 9); sctx.stroke();
  }

  // ✋ ORGANİK AKIŞ PARALAKSI (referans video): her kart hedefe KENDİ hızında süzülür —
  // yakınlar çevik, uzaklar gecikmeli yetişir; bulut dalga gibi akar, ekrandan çıkmaz.

  if (REEL) document.body.classList.toggle('holding', !!held); // hayalet yuvalar: elde kart varken görünür

  // 🌊 İTME ALANI (yalnız reel): el yaklaşınca kartlar yumuşakça YOL VERİR — elle senkron his
  const REPEL_R = 250;

  // yuva vurgusu: tutulan kart yuvada KISA SÜRE beklerse emilir (üzerinden geçerken yutmaz)
  let hotSlot = null;
  if (held) {
    hotSlot = slotAt(held.x + held.w / 2, held.y + held.h / 2);
    if (hotSlot) {
      if (hotSlotCur === hotSlot) {
        if (tNow - hotSince > 200) absorb(held, hotSlot);   // ~0.2sn niyet onayı
      } else { hotSlotCur = hotSlot; hotSince = tNow; }
    } else hotSlotCur = null;
  } else hotSlotCur = null;
  SLOTS.forEach(s => s.el.classList.toggle('hot', s === hotSlot));

  if (orbitMode) orbitA += 0.0042 * dt;   // uzayda ağır dönüş (~25sn/tur)

  for (const c of cards) {
    if (c === held) {
      const nx = c.x + (c.tx - c.x) * LERP * dt;
      const ny = c.y + (c.ty - c.y) * LERP * dt;
      c.vx = nx - c.x; c.vy = ny - c.y;
      c.x = nx; c.y = ny;
    } else if (orbitMode) {
      // 3D YÖRÜNGE: 4 formasyon — öndekiler büyük/parlak, arkadakiler küçük/soluk
      const f = c.oi / Math.max(1, cards.length);
      const R = Math.min(innerWidth * 0.38, 620);
      const cx0 = innerWidth / 2, cy0 = innerHeight * 0.46;
      let th2 = orbitA + f * Math.PI * 2, depth, ox, oy;
      if (orbitType === 1) {          // 🧬 SARMAL KULE: dikey spiral, çift tur
        th2 = orbitA * 1.15 + f * Math.PI * 4;
        depth = Math.sin(th2);
        ox = cx0 + Math.cos(th2) * R * 0.55 - c.baseW / 2;
        oy = innerHeight * (0.14 + 0.62 * f) + depth * 8 - c.baseH / 2;
      } else if (orbitType === 2) {   // ∞ SONSUZLUK: yatay sekiz çizer
        depth = Math.sin(th2 * 2 + 1);
        ox = cx0 + Math.sin(th2) * R - c.baseW / 2;
        oy = cy0 + Math.sin(th2 * 2) * innerHeight * 0.16 - c.baseH / 2;
      } else if (orbitType === 3) {   // 🌌 GALAKSİ DİSKİ: içtekiler hızlı döner (diferansiyel)
        const rr = R * (0.3 + 0.7 * f);
        th2 = orbitA * (1.7 - 0.9 * f) + f * Math.PI * 5;
        depth = Math.sin(th2) * (0.4 + 0.6 * f);
        ox = cx0 + Math.cos(th2) * rr - c.baseW / 2;
        oy = cy0 + Math.sin(th2) * rr * 0.38 - c.baseH / 2;
      } else {                        // 💍 HALKA: klasik elips
        depth = Math.sin(th2);
        ox = cx0 + Math.cos(th2) * R - c.baseW / 2;
        oy = cy0 + depth * innerHeight * 0.07 - c.baseH / 2;
      }
      c.x += (ox - c.x) * 0.09 * dt; c.y += (oy - c.y) * 0.09 * dt;
      c.vx = 0; c.vy = 0; c.tx = c.x; c.ty = c.y;
      c.w += (c.tw - c.w) * 0.14 * dt; c.h += (c.th - c.h) * 0.14 * dt;
      const oS = (0.68 + 0.42 * (depth + 1) / 2) * (c.w / c.baseW);
      const ry = -Math.cos(th2) * 26;                         // yanlardakiler içe bakar
      c.el.style.zIndex = 10 + Math.round((depth + 1) * 6);
      c.el.style.opacity = 0.55 + 0.45 * (depth + 1) / 2;
      c.el.style.transform =
        `translate(${c.x}px,${c.y}px) rotateY(${ry}deg) rotate(${Math.sin(t * .5 + c.bobA) * 3}deg) scale(${oS})`;
      continue;
    } else {
      if (REEL && handOn) {   // 🌊 itme alanı: ele yaklaşan kart yumuşakça uzaklaşır
        const rdx = c.x + c.w / 2 - handFX, rdy = c.y + c.h / 2 - handFY;
        const rd = Math.hypot(rdx, rdy);
        if (rd < REPEL_R && rd > 0.5) {
          const rf = (1 - rd / REPEL_R) * 2.3 * dt;
          c.vx += (rdx / rd) * rf; c.vy += (rdy / rd) * rf;
        }
      }
      c.x += c.vx * dt; c.y += c.vy * dt;
      c.vx *= Math.pow(DAMP, dt); c.vy *= Math.pow(DAMP, dt);
      c.pull += (0.02 - c.pull) * 0.012 * dt;
      c.x += (c.tx - c.x) * c.pull * dt;
      c.y += (c.ty - c.y) * c.pull * dt;
      if (c.x < 4) { c.x = 4; c.vx = Math.abs(c.vx) * .55; }
      if (c.y < 72) { c.y = 72; c.vy = Math.abs(c.vy) * .55; }
      if (c.x + c.w > innerWidth - 4)  { c.x = innerWidth - 4 - c.w;  c.vx = -Math.abs(c.vx) * .55; }
      if (c.y + c.h > innerHeight - 72){ c.y = innerHeight - 72 - c.h; c.vy = -Math.abs(c.vy) * .55; }
      if (Math.abs(c.tx - c.x) < 2 && Math.abs(c.ty - c.y) < 2) { c.tx = c.x; c.ty = c.y; }
    }
    c.w += (c.tw - c.w) * 0.14 * dt;
    c.h += (c.th - c.h) * 0.14 * dt;
    c.rot += (c.trot - c.rot) * 0.12 * dt;
    const bob = c === held ? 0 : Math.sin(t * c.bobS + c.bobA) * (REEL ? 11 : 1.1); // süzülme (reel: belirgin)
    const bobX = (c === held || !REEL) ? 0 : Math.cos(t * c.bobS * .85 + c.bobA) * 9;
    const rot = c.rot + (c === held ? 0 : Math.sin(t * c.bobS * .8 + c.bobA) * (REEL ? 2.2 : 0.4));
    // organik paralaks: kart kendi hızıyla hedefe süzülür (dalga hissi);
    // ölçek derinlikle nefes alır → "arkaya gidip geliyor". Sınırlı, taşma yok.
    let px2 = 0, py2 = 0, ps = 1;
    if (c !== held) {
      c.pX += (-parTX * c.ampX - c.pX) * c.pK * dt;
      c.pY += (-parTY * c.ampY - c.pY) * c.pK * dt;
      px2 = c.pX; py2 = c.pY;
      const mag = Math.hypot(c.pX / c.ampX, c.pY / c.ampY);
      ps = 1 + mag * (c.depth - 0.45) * 0.16;
    }
    // 🌌 UZAY DALGASI (reel): konuma bağlı fazla 3D salınım — dalga alanın içinden geçer;
    // kartlar öne-arkaya nefes alır (scale) ve hafifçe yalpalanır (rotateY/X, gerçek perspektif)
    let r3d = '', scW = 1;
    if (REEL && c !== held) {
      const ph = c.bobA + c.tx * 0.0016 + c.ty * 0.0011;
      scW = 1 + Math.sin(t * 0.5 + ph) * 0.15;
      r3d = ` rotateY(${(Math.sin(t * 0.42 + ph) * 13).toFixed(2)}deg) rotateX(${(Math.cos(t * 0.36 + ph) * 8).toFixed(2)}deg)`;
    }
    // PERFORMANS: boyut değişimi layout tetikleyen width/padding yerine GPU'daki scale ile
    const sc = (c.w / c.baseW) * ps * scW;
    c.el.style.transform =
      `translate(${c.x + px2 + bobX + (c.w - c.baseW) / 2}px,${c.y + py2 + bob + (c.h - c.baseH) / 2}px)${r3d} rotate(${rot}deg) scale(${sc})`;
  }

  ambientDust(dt);
  fctx.clearRect(0, 0, fx.width, fx.height);
  sparks = sparks.filter(s => s.life > 0);
  if (sparks.length > 160) sparks.splice(0, sparks.length - 160);  // parçacık tavanı
  // PERFORMANS: iki geçiş — küçükler glow'suz, glow sadece büyüklerde (shadowBlur pahalı)
  fctx.shadowBlur = 0; fctx.fillStyle = '#ffffff';
  for (const s of sparks) {
    s.x += s.vx * dt; s.y += s.vy * dt; s.life -= (s.slow ? .006 : .02) * dt;
    if (s.big) continue;
    fctx.globalAlpha = s.life * .8;
    fctx.beginPath(); fctx.arc(s.x, s.y, 1.5 + 1.6 * s.life, 0, 7); fctx.fill();
  }
  fctx.fillStyle = '#ffd6f0'; fctx.shadowColor = '#ffc9ec'; fctx.shadowBlur = 9;
  for (const s of sparks) {
    if (!s.big) continue;
    fctx.globalAlpha = s.life * .85;
    fctx.beginPath(); fctx.arc(s.x, s.y, 2.6 + 1.8 * s.life, 0, 7); fctx.fill();
  }
  fctx.globalAlpha = 1; fctx.shadowBlur = 0;

  // sci-fi şok dalgaları (savurma anı): genişleyen neon halkalar
  waves = waves.filter(w => w.life > 0);
  for (const w of waves) {
    w.r += w.s * dt; w.life -= 0.024 * dt;
    fctx.globalAlpha = w.life * .85;
    fctx.strokeStyle = '#67e8f9';
    fctx.lineWidth = .6 + 2.6 * w.life;
    fctx.shadowColor = '#67e8f9'; fctx.shadowBlur = 16 * w.life;
    fctx.beginPath(); fctx.arc(w.x, w.y, w.r, 0, 7); fctx.stroke();
  }
  fctx.globalAlpha = 1; fctx.shadowBlur = 0;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ================= EL İSKELETİ ÇİZİMİ (eklem renkleri: uç/IP=pembe, boğum=sarı, bilek=kırmızı) =================
const hc = document.getElementById('hand'), hctx = hc.getContext('2d');
function resizeHand(){ hc.width = innerWidth; hc.height = innerHeight; }
addEventListener('resize', resizeHand); resizeHand();
const HAND_CONN = [ // MediaPipe kemik bağlantıları
  [0,1],[1,2],[2,3],[3,4],        // baş parmak
  [0,5],[5,6],[6,7],[7,8],        // işaret
  [5,9],[9,10],[10,11],[11,12],   // orta
  [9,13],[13,14],[14,15],[15,16], // yüzük
  [13,17],[17,18],[18,19],[19,20],// serçe
  [0,17]                          // avuç kenarı
];
const JOINT_COLOR = i =>
  i === 0                       ? '#ff2038' :  // bilek (CMC) kırmızı — kamera için doygun
  [1,5,9,13,17].includes(i)     ? '#ffcf28' :  // boğumlar (MCP) sarı
                                  '#ff5c8a';   // orta eklem + uçlar (IP) canlı pembe
function drawHands(hands) {
  hctx.clearRect(0, 0, hc.width, hc.height);
  for (const lm of hands) {
    const px = i => (1 - lm[i].x) * innerWidth;   // aynalı
    const py = i => lm[i].y * innerHeight;
    // kemikler — TELEFON KAMERASI İÇİN: önce koyu kontur (kontrast), üstüne kalın parlak çizgi
    hctx.lineCap = 'round';
    hctx.strokeStyle = 'rgba(2,6,16,.55)';
    hctx.lineWidth = 7;
    hctx.beginPath();
    for (const [a, b] of HAND_CONN) { hctx.moveTo(px(a), py(a)); hctx.lineTo(px(b), py(b)); }
    hctx.stroke();
    hctx.strokeStyle = 'rgba(190,242,255,.95)';
    hctx.lineWidth = 3.5;
    hctx.shadowColor = '#67e8f9'; hctx.shadowBlur = 10;
    hctx.stroke();                                 // aynı path'i parlak + glow ile tekrar çiz
    hctx.shadowBlur = 0;
    // eklem noktaları: hepsi büyük + glow'lu (kamerada net okunsun)
    for (let i = 0; i < 21; i++) {
      const tip = [4,8,12,16,20].includes(i);
      hctx.fillStyle = JOINT_COLOR(i);
      hctx.shadowColor = JOINT_COLOR(i); hctx.shadowBlur = 14;
      hctx.beginPath();
      hctx.arc(px(i), py(i), (i === 0 ? 9 : tip ? 7.5 : 5.5), 0, 7);
      hctx.fill();
    }
    hctx.shadowBlur = 0;
  }
}

// ================= EL TAKİBİ =================
const video = document.getElementById('cam');
const dots = [document.getElementById('dot0'), document.getElementById('dot1')];
const PINCH_ON = 0.055, PINCH_OFF = 0.085;
const pinchState = [false, false];
let prevPalm = null;
let releaseAt = 0;     // son bırakma anı (avuç jestleriyle çakışmayı önler)
let swipePrev = null, swipeV = 0, lastSwipe = 0;   // 🖐️➡️ savurma algılama
let twoDist = null, clapV = 0, lastClap = 0;       // 👏 alkış algılama
let aimed = null;                                  // 🎯 parmağın altındaki kart (nişan)
let heldAt = 0, heldPrevX = null, heldPrevY = null; // ↔️ fırlatma algılama
let openStreak = 0, heldPrevD = null;               // bırakma: avuç HAREKETSİZ açık olmalı (zoom'da kaçmasın)
let heldD0 = 0, lastZoomAt = 0;                     // zoom sıfır noktası (tutma anı) + son aktif zoom zamanı
let handFX = 0, handFY = 0, handOn = false;         // 🌊 itme alanı: el konumu (kartlar yol verir)

function airPress(el) { // havadan buton basma: görsel bastırma + klik
  el.classList.remove('press'); void el.offsetWidth; el.classList.add('press');
  sndGrab();
  el.click();
}
function fingerExtended(lm, tip, pip) {
  const w = lm[0];
  return Math.hypot(lm[tip].x - w.x, lm[tip].y - w.y) >
         Math.hypot(lm[pip].x - w.x, lm[pip].y - w.y) * 1.12;
}

// ===== EL TİTREME FİLTRESİ: uyarlanabilir EMA — duruşta taş gibi sabit, hızlıda gecikmesiz =====
let smoothHands = [];
function smoothLandmarks(raw) {
  const out = [], used = new Set();
  for (const lm of raw) {
    let best = null, bd = 0.25;               // en yakın önceki eli eşle (eller yer değiştirse de)
    smoothHands.forEach((sh, i) => {
      if (used.has(i)) return;
      const d = Math.hypot(sh[0].x - lm[0].x, sh[0].y - lm[0].y);
      if (d < bd) { bd = d; best = i; }
    });
    if (best === null) out.push(lm.map(p => ({ x: p.x, y: p.y })));
    else {
      used.add(best);
      const prev = smoothHands[best];
      out.push(lm.map((p, j) => {
        const q = prev[j];
        const d = Math.hypot(p.x - q.x, p.y - q.y);
        const a = Math.min(0.8, 0.12 + d * 26);   // yavaş=güçlü filtre, hızlı=çevik takip
        return { x: q.x + (p.x - q.x) * a, y: q.y + (p.y - q.y) * a };
      }));
    }
  }
  smoothHands = out;
  return out;
}

function onResults(res) {
  const hs = smoothLandmarks((res.multiHandLandmarks || []).slice(0, 2));
  drawHands(hs);   // eklem renkli iskelet — filtreden geçmiş, titremez
  dots.forEach(d => d.style.display = 'none');
  const pts = [];

  hs.forEach((lm, hi) => {   // zaten filtreli ve en fazla 2 el
    const th = lm[4], ix = lm[8];
    const d = Math.hypot(th.x - ix.x, th.y - ix.y);
    const wasPinch = pinchState[hi];
    if (!pinchState[hi] && d < PINCH_ON)  pinchState[hi] = true;
    if ( pinchState[hi] && d > PINCH_OFF) pinchState[hi] = false;
    const open = !pinchState[hi] &&
      fingerExtended(lm, 8, 6) && fingerExtended(lm, 12, 10) &&
      fingerExtended(lm, 16, 14) && fingerExtended(lm, 20, 18);
    const x = (1 - (th.x + ix.x) / 2) * innerWidth;
    const y = ((th.y + ix.y) / 2) * innerHeight;
    const palmX = (1 - lm[9].x) * innerWidth;
    const palmY = lm[9].y * innerHeight;
    const span = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y) || 0.001; // avuç boyu: uzaklık normalizasyonu
    pts.push({ x, y, pinch: pinchState[hi], pinchNew: pinchState[hi] && !wasPinch, open, palmX, palmY, d, span });
    const dot = dots[hi];
    dot.style.display = 'block';
    dot.style.left = x + 'px'; dot.style.top = y + 'px';
    dot.classList.toggle('pinch', pinchState[hi]);
    dot.classList.toggle('palm', open);
  });

  // --- HAVADAN BASMA: imleç buton/yuva üstündeyse vurgulanır, kıstırınca basılır ---
  // (REEL modunda kapalı: yuvalar sadece BIRAKMA hedefi — yanlışlıkla albüm açılıp akış bozulmasın)
  let uiHit = null;
  if (!held && !REEL) {
    for (const p of pts) {
      const el = document.elementFromPoint(p.x, p.y);
      const ui = el && el.closest ? el.closest('.chip, .slot') : null;
      if (ui && ui.id !== 'chipCount' && ui.id !== 'chipGest') { uiHit = { ui, p }; break; }
    }
  }
  document.querySelectorAll('.chip.hov, .slot.hov').forEach(e => { if (!uiHit || e !== uiHit.ui) e.classList.remove('hov'); });
  if (uiHit) uiHit.ui.classList.add('hov');
  // albüm görünümü açıkken: avuçla şeridi kaydır + havadan Kapat'a bas
  if (document.getElementById('albumView').classList.contains('on')) {
    if (uiHit && uiHit.p.pinchNew) airPress(uiHit.ui);
    const pl = pts.find(q => q.open);
    if (pl) {
      if (prevPalm) bmPos += (pl.palmY - prevPalm.y) * 0.006;
      prevPalm = { x: pl.palmX, y: pl.palmY };
    } else prevPalm = null;
    return;
  }
  if (uiHit && uiHit.p.pinchNew) { airPress(uiHit.ui); return; }

  // BIRAKMA: el kadrajdan çıktı VEYA avuç ~0.6sn HAREKETSİZ açık kaldı.
  // Parmak arası aktif değişiyorsa (zoom yapılıyorsa) sayaç sıfırlanır — zoom'da asla kaçmaz.
  const hp = holdHand >= 0 && holdHand < pts.length ? pts[holdHand] : null;
  if (held) openStreak = (hp && hp.open) ? openStreak + 1 : 0;
  if (held && hp) {
    const dRel = hp.d / hp.span;   // el boyutuna oranlı: kameraya yakınlık/uzaklık etkilemez
    if (heldPrevD !== null && Math.abs(dRel - heldPrevD) > 0.02) {
      openStreak = 0; lastZoomAt = performance.now();   // aktif zoom: bırakma VE fırlatma kilitli
    }
    heldPrevD = dRel;
  }
  if (held && (!hp || openStreak > 18)) {
    spark(held.x + held.w / 2, held.y + held.h / 2, 16, 5);
    held.tw = held.baseW; held.th = held.baseH;
    held.trot = (Math.random() - .5) * 26;
    held.vx *= 1.5; held.vy *= 1.5;
    held.tx = held.x; held.ty = held.y;
    held.el.classList.remove('held'); held = null; holdHand = -1;
    releaseAt = performance.now();      // bırakır bırakmaz avuç kaydırmayı tetiklemesin
  }
  // 🌊 itme alanı için el konumu (ilk elin avuç merkezi)
  handOn = pts.length > 0 && !held;
  if (handOn) { handFX = pts[0].palmX; handFY = pts[0].palmY; }

  // 👏 ALKIŞ: iki el hızla birleşince 3D yörünge modu aç/kapa
  if (pts.length === 2) {
    const dd = Math.hypot(pts[0].palmX - pts[1].palmX, pts[0].palmY - pts[1].palmY);
    if (twoDist !== null) {
      clapV = clapV * 0.5 + (twoDist - dd) * 0.5;             // yaklaşma hızı (yumuşatılmış)
      if (dd < 150 && clapV > 15 && performance.now() - lastClap > 2000 && !held) {
        lastClap = performance.now();
        lastSwipe = performance.now();                         // alkış savurmayı tetiklemesin
        clapV = 0;
        toggleOrbit((pts[0].palmX + pts[1].palmX) / 2, (pts[0].palmY + pts[1].palmY) / 2);
      }
    }
    twoDist = dd;
  } else { twoDist = null; clapV = 0; }

  // 🎯 NİŞAN: parmağın altındaki kart işaretlenir — neyi tutacağın belli olur
  const tgt = (!held && pts.length) ? cardAt(pts[0].x, pts[0].y) : null;
  if (aimed !== tgt) {
    if (aimed) aimed.el.classList.remove('aim');
    aimed = tgt;
    if (aimed) aimed.el.classList.add('aim');
  }

  // TUTMA: sadece KISTIRMA ANINDA (pinchNew) — el kapalı gezerken yanlışlıkla kapmaz
  if (!held) {
    for (let hi = 0; hi < pts.length; hi++) {
      if (pts[hi].pinchNew) {
        const c = cardAt(pts[hi].x, pts[hi].y);
        if (c) {
          held = c; holdHand = hi; c.el.classList.add('held');
          c.el.classList.remove('aim'); if (aimed === c) aimed = null;
          c.el.style.opacity = ''; c.el.style.zIndex = '';    // yörünge kalıntısı temizle
          heldAt = performance.now(); heldPrevX = heldPrevY = null; heldPrevD = null; openStreak = 0;
          heldD0 = pts[hi].d / pts[hi].span;   // zoom sıfır noktası: TUTMA anındaki parmak aralığı
          spark(pts[hi].x, pts[hi].y, 12, 4);
          c.trot = 0;
          cards.splice(cards.indexOf(c), 1); cards.push(c);
          sndGrab();
          break;
        }
      }
    }
  }
  // SÜRÜKLEME + telefon usulü BÜYÜTME: başparmak-işaret arası açıldıkça kart büyür
  if (held) {
    const p = pts[holdHand];
    // ↔️ FIRLATMA: kart eldeyken hızlı yatay itiş = kart elden dönerek fırlar
    const hvx = heldPrevX === null ? 0 : p.x - heldPrevX;
    const hvy = heldPrevY === null ? 0 : p.y - heldPrevY;
    heldPrevX = p.x; heldPrevY = p.y;
    if (Math.abs(hvx) > 62 && Math.abs(hvx) > Math.abs(hvy) * 1.6
        && performance.now() - heldAt > 350
        && performance.now() - lastZoomAt > 450) {   // aktif zoom sırasında fırlatma yok
      const c = held, dir = Math.sign(hvx);
      c.vx = hvx * 1.25; c.vy = hvy * 0.8;        // itiş hızıyla uçar, duvardan seker
      c.tw = c.baseW; c.th = c.baseH;
      c.tx = c.x; c.ty = c.y; c.pull = 0.01;
      c.trot = dir * 42;                           // fırlarken döner
      spark(c.x + c.w / 2, c.y + c.h / 2, 26, 9);
      sndWhoosh(1);
      c.el.classList.remove('held');
      held = null; holdHand = -1; openStreak = 0;
      releaseAt = performance.now();
    } else {
      held.tx = p.x - held.w / 2; held.ty = p.y - held.h / 2;
      spark(p.x, p.y, 1, 2.5);
      // KONTROLLÜ ZOOM: tutma anındaki parmak aralığı SIFIR noktası; oradan açtıkça %80'e dek.
      // Mesafe avuç boyuna oranlı — elin kameraya yakın/uzak olması zoom'u bozmaz.
      const ratio = held.baseH / held.baseW;
      const dRel = p.d / p.span;
      const sN = Math.min(1, Math.max(0, (dRel - heldD0 - 0.15) / 0.9)); // 0=tuttuğun gibi … 1=tam açık
      const gMin = Math.max(held.baseW * 1.3, innerWidth * 0.13);
      const gMax = Math.min(innerWidth * 0.8, (innerHeight * 0.74) / ratio);
      const gw = gMin + (gMax - gMin) * Math.pow(sN, 1.25);
      held.tw = gw; held.th = gw * ratio;
      held.trot = Math.max(-18, Math.min(18, held.vx * 1.8));   // el hareketiyle sallanma
    }
    parTX = 0; parTY = 0;   // kart taşırken arka plan sabitlenir (baş dönmesi olmasın)
  } else {
    const palm = pts.find(q => q.open);
    // 🖐️➡️ SAVURMA: açık el hızla süpürülünce — normalde bulut dağılması,
    // YÖRÜNGEDEYKEN formasyon değiştirir (halka→sarmal→sonsuzluk→galaksi).
    // İki el birbirine yakınken devre dışı (alkışla karışmasın).
    if (palm && !(pts.length === 2 && twoDist !== null && twoDist < 320)) {
      if (swipePrev !== null) {
        swipeV = swipeV * 0.6 + (palm.palmX - swipePrev) * 0.4;   // yumuşatılmış yatay hız
        if (Math.abs(swipeV) > 38 && performance.now() - lastSwipe > 1600
            && performance.now() - releaseAt > 600) {
          lastSwipe = performance.now();
          swipeV = 0;
          if (orbitMode) {
            orbitType = (orbitType + 1) % 4;                       // sıradaki formasyon
            for (let k = 0; k < 3; k++)
              waves.push({ x: palm.palmX, y: palm.palmY, r: 12 + k * 24, s: 14 + k * 4, life: 1 });
            sndShuffle();
          } else {
            swipeScatter(Math.sign(palm.palmX - swipePrev) || 1, palm.palmX, palm.palmY);
          }
        }
      }
      swipePrev = palm.palmX;
    } else { swipePrev = null; swipeV = 0; }
    // SENKRON PARALAKS hedefi: herhangi bir el (poz fark etmez) ekranda gezindikçe
    // galeri onunla döner — parmakla daire çiz, fotoğraflar daire çizsin.
    const anyHand = pts[0];
    if (anyHand) {
      parTX = (anyHand.x / innerWidth  - 0.5) * 2;   // -1..1
      parTY = (anyHand.y / innerHeight - 0.5) * 2;
    } else { parTX = 0; parTY = 0; }                 // el yok: galeri yerine süzülür
    // 🖐️⬆ açık avuç en üstte: diziliş değiştir
    if (palm && palm.palmY < innerHeight * 0.17 && performance.now() - lastShuffle > 2200
        && performance.now() - releaseAt > 600) {
      lastShuffle = performance.now();
      reshuffle();
    }
  }
}

// ================= AIRCHIP INTRO (Black Mirror ruhu, kod ile) =================
function sndHum() { // BM-esinli gerilim: NABIZ GİBİ ATAN yükselen ton (referans spektrumundan)
  if (!AC) return;
  const t = AC.currentTime;
  // gövde: yükselen sinüs
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(48, t);
  o.frequency.exponentialRampToValueAtTime(118, t + 3.4);
  // tremolo LFO: nabız hissi (spektrumdaki dikey çizgiler)
  const lfo = AC.createOscillator(), lg = AC.createGain();
  lfo.type = 'square'; lfo.frequency.setValueAtTime(7, t);
  lfo.frequency.linearRampToValueAtTime(13, t + 3.2);   // gerilim arttıkça nabız hızlanır
  lg.gain.value = 0.05;
  lfo.connect(lg).connect(g.gain);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.12, t + .9);
  g.gain.setValueAtTime(0.12, t + 2.9);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 3.5);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t + 3.6);
  lfo.start(t); lfo.stop(t + 3.6);
  // ikinci katman: bir oktav üstte hafif detune gerginlik
  const o2 = AC.createOscillator(), g2 = AC.createGain();
  o2.type = 'triangle'; o2.frequency.setValueAtTime(97, t);
  o2.frequency.exponentialRampToValueAtTime(239, t + 3.4);  // hafif falso = tekinsizlik
  g2.gain.setValueAtTime(0.0001, t);
  g2.gain.exponentialRampToValueAtTime(0.045, t + 1.4);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + 3.5);
  o2.connect(g2).connect(AC.destination); o2.start(t); o2.stop(t + 3.6);
}
function sndCrack() { // BM-esinli KIRILMA: patlama + 2kHz cam çınlaması + bas gümleme
  if (!AC) return;
  const t = AC.currentTime;
  // 1) geniş bant patlama
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.34, t + .012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + .5);
  src.connect(hp).connect(g).connect(AC.destination); src.start(t); src.stop(t + .55);
  // 2) cam çınlaması: ~2kHz rezonan halka (referansın imza frekansı)
  const ring = AC.createOscillator(), rg = AC.createGain();
  ring.type = 'sine'; ring.frequency.setValueAtTime(2050, t);
  ring.frequency.exponentialRampToValueAtTime(1870, t + .9);
  rg.gain.setValueAtTime(0.0001, t);
  rg.gain.exponentialRampToValueAtTime(0.09, t + .02);
  rg.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
  ring.connect(rg).connect(AC.destination); ring.start(t); ring.stop(t + 1.05);
  // 3) bas gümleme: gövdeye ağırlık
  const th = AC.createOscillator(), tg = AC.createGain();
  th.type = 'sine'; th.frequency.setValueAtTime(120, t);
  th.frequency.exponentialRampToValueAtTime(42, t + .4);
  tg.gain.setValueAtTime(0.0001, t);
  tg.gain.exponentialRampToValueAtTime(0.22, t + .02);
  tg.gain.exponentialRampToValueAtTime(0.0001, t + .5);
  th.connect(tg).connect(AC.destination); th.start(t); th.stop(t + .55);
}
function playIntro() {
  const seq = document.getElementById('introSeq');
  seq.style.display = 'flex';
  const timers = [];
  let started = false, ended = false;
  const beat = (ring, title, crack, fin) => { // zaman çizelgesi (ms)
    timers.push(setTimeout(() => document.getElementById('introRing').classList.add('on'), ring));
    timers.push(setTimeout(() => document.getElementById('introTitle').classList.add('on'), title));
    timers.push(setTimeout(() => {
      document.getElementById('introCrack').classList.add('flash');
      document.getElementById('introTitle').classList.add('cracked');   // yazı çatlakta ikiye ayrılır
      document.getElementById('introRing').style.opacity = 0;           // halka kırılmayla söner
    }, crack));
    timers.push(setTimeout(done, fin));
  };
  // GERÇEK TEMA (yalnız lokal çekim sürümünde bulunur; yayında dosya yok -> sentez ikiz çalar)
  const a = new Audio('intro_theme.m4a');
  a.preload = 'auto'; a.volume = 1;
  const synth = () => {
    if (started) return; started = true;
    sndHum();
    beat(250, 1500, 3100, 4300);
    timers.push(setTimeout(sndCrack, 3100));
  };
  // play() BAŞLAT tıklamasının çağrı yığını İÇİNDE çağrılır -> autoplay engeli yok;
  // dosya henüz inmemişse tarayıcı hazır olunca kendisi başlatır.
  a.play().then(() => {
    if (started) return; started = true;
    // klibin enerji haritasına senkron: 2.6sn plato=başlık, 5.65sn doruk=kırılma, 6.9sn=çıkış
    beat(200, 2600, 5650, 6900);
  }).catch(synth);                        // dosya yok/reddedildi -> sentez ikiz
  timers.push(setTimeout(synth, 1200));   // sigorta: 1.2sn'de hâlâ başlamadıysa sentez
  function done() {
    if (ended) return; ended = true;
    timers.forEach(clearTimeout);
    sndWhoosh(1);
    seq.classList.add('out');            // halka büyüyerek galeriye açılır
    setTimeout(() => { seq.remove(); a.pause(); }, 1350);
  }
  seq.addEventListener('click', done, { once: true }); // dokun = geç
}

// ================= BAŞLATMA (ses + mobil kamera için dokunuş şart) =================
async function startApp(skipIntro) {
  document.getElementById('startOverlay').remove();
  audioInit();
  if (AC && AC.state === 'suspended') AC.resume();
  if (!skipIntro) playIntro();           // galeri intro arkasında hazırlanır, geçiş kaygan olur
  await DB.open();
  let albums = await DB.all('albums');
  // varsayılan albümler eksikse tamamla (eski kurulumlar dahil)
  for (const label of ['FAMILY', 'TRAVEL', 'CHILDHOOD']) {
    if (!albums.some(a => a.label === label)) await DB.add('albums', { label });
  }
  albums = await DB.all('albums');
  SLOTS = [];
  albums.forEach(createSlot);
  const mpHands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  mpHands.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,                   // hafif model: jestler için yeterli, 2-3x hızlı
    minDetectionConfidence: 0.6, minTrackingConfidence: 0.6
  });
  mpHands.onResults(onResults);
  new Camera(video, {
    onFrame: async () => await mpHands.send({ image: video }),
    width: IS_MOBILE ? 640 : 960, height: IS_MOBILE ? 360 : 540,
    facingMode: 'user'
  }).start();
  spawnCards();
}
document.getElementById('startBtn').addEventListener('click', () => startApp(false));
const QP = new URLSearchParams(location.search);
if (QP.has('autostart')) startApp(!QP.has('intro')); // headless test (introsuz; &intro ile introlu)
